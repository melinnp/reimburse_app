<!-- HEADER -->
  <body style="font-family: 'Poppins', sans-serif">
    <div class="container-fluid">
      <div class="d-flex justify-content-center align-items-center mt-3">
        <div class="card shadow" style="width: 400px; height: 450px;">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body">
            <h5 class="fw-semibold mb-4">Profile Settings</h5>

            <!-- FOTO PROFIL -->
            <div class="text-center mb-4">
    <img
        id="previewImage"
        src="https://via.placeholder.com/150"
        class="rounded-circle mb-3"
        width="100"
        height="100"
        style="object-fit: cover; border: 3px solid #dee2e6;"
        alt="Foto Profil">
    <div class="mb-1">
    <input type="file" class="form-control form-control-sm" accept="image/*" id="fotoInput">
    </div>
</div>
            <!-- NAMA -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control form-control-sm" placeholder="Masukkan Username">
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control form-control-sm" placeholder="Masukkan email">
            </div>

            <!-- NO HP -->
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="text" class="form-control form-control-sm" placeholder="Masukkan Password">
            </div>

            <!-- BUTTON -->
            <div class="text-end">
                <button class="btn btn-sm btn-primary px-4">
                    Save 
                </button>
            </div>
        </div>
    </div>
</div>

<!-- JAVASCRIPT (DALAM FILE YANG SAMA) -->
<script>
    const inputFoto = document.getElementById('fotoInput');
    const preview = document.getElementById('previewImage');

    inputFoto.addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
            preview.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>

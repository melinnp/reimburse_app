<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard - Approval Reimbursement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="stylingjs/cssoffcanvas.css" />
  </head>
  <body>
    <div class="layout" id="layout"></div>
    <div id="main-content">
      <div class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="fw-bold m-0">Antrean Persetujuan</h4>

          <div class="input-group" style="width: 300px">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Cari nama karyawan..." />
          </div>
        </div>

        <div class="table-card p-3">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Karyawan</th>
                  <th>Kategori</th>
                  <th>Nominal</th>
                  <th>Bukti</th>
                  <th class="text-center">Aksi</th>
                </tr>
              </thead>
              <tbody id="approvalTable">
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="notaModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">
              <i class="bi bi-file-earmark-image me-2"></i>Bukti Reimbursement
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body text-center">
            <img
              id="notaImage"
              src=""
              alt="Bukti Reimbursement"
              class="img-fluid rounded border"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="rejectModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title fw-bold"><i class="bi bi-exclamation-triangle me-2"></i>Tolak Pengajuan</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p>Anda akan menolak pengajuan dari <span id="rejectTargetName" class="fw-bold"></span> (<span id="rejectTargetID" class="text-muted"></span>).</p>
            <div class="mb-3">
              <label class="form-label fw-bold small">Alasan Penolakan</label>
              <textarea id="rejectReason" class="form-control" rows="4" placeholder="Contoh: Nota tidak terbaca..."></textarea>
              <div class="invalid-feedback">Alasan harus diisi!</div>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Batal</button>
            <button type="button" class="btn btn-danger px-4" id="btnConfirmReject">Kirim Penolakan</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="stylingjs/approval1.js"></script>
    <script src="../Admin/stylingjs/partials.js"></script>
    <script src="../Script/helper.js"></script>
    <script src="../Script/admin/approval.js"></script>
  </body>
</html>

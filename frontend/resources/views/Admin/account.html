<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Dashboard - Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="stylingjs/cssoffcanvas.css" />
  </head>
  <body>
    <div id="mainContent">
      <nav class="navbar" style="background-color: rgb(4, 4, 70)">
        <div class="d-flex align-items-center px-2">
          <i class="bi bi-list fs-4 me-2 text-white" role="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling" aria-controls="offcanvasScrolling"></i>
          <span class="navbar-brand mb-0 text-white h1">Account</span>
        </div>
      </nav>

      <div class="offcanvas offcanvas-start" style="width: 250px; background-color: rgb(4, 4, 70)" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
        <div class="offcanvas-header border-bottom border-secondary">
          <h5 class="offcanvas-title text-center text-white fw-bold" id="offcanvasScrollingLabel">ADMIN</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-0">
          <ul class="list-unstyled m-0">
            <li>
              <a href="index2.html" class="nav-link-custom p-3"> <i class="bi bi-columns-gap me-2"></i> Dashboard </a>
            </li>
            <li>
              <a href="employees.html" class="nav-link-custom p-3"> <i class="bi bi-person me-2"></i> Employees </a>
            </li>
            <li>
              <a href="approval.html" class="nav-link-custom p-3"> <i class="bi bi-bookmark-check me-2"></i> Approval </a>
            </li>
            <li>
              <a href="account.html" class="nav-link-custom p-3 nav-active"> <i class="bi bi-person-bounding-box me-2"></i> Account </a>
            </li>
          </ul>

          <div class="user-profile-section p-3 mt-auto d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
              <div class="bg-secondary rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px">
                <i class="bi bi-person-fill text-white"></i>
              </div>
              <div class="ms-2 text-white">
                <div class="fw-bold small">Admin Name</div>
                <div style="font-size: 0.7rem; opacity: 0.7">admin@edu.id</div>
              </div>
            </div>
            <div class="dropdown">
              <a href="#" class="text-white dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-three-dots-vertical"></i>
              </a>
              <ul class="dropdown-menu dropdown-menu-dark shadow border-secondary">
                <li>
                  <a class="dropdown-item small" href="#"><i class="bi bi-gear me-2"></i>Settings</a>
                </li>
                <li><hr class="dropdown-divider border-secondary" /></li>
                <li>
                  <a class="dropdown-item small text-danger" href="login.html"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="container mt-4">
        <div class="card shadow mx-auto" style="max-width: 350px">
          <div class="card-body">
            <h5 class="text-center mb-4">Account Settings</h5>

            <div class="avatar mb-4" id="displayAvatar">
              <span class="avatar-text" id="avatarInitial">A</span>
            </div>

            <div class="mb-3">
              <strong>Username</strong>
              <p id="displayUsername">admin</p>
            </div>

            <div class="mb-3">
              <strong>Email</strong>
              <p id="displayEmail">admin@mail.com</p>
            </div>

            <div class="mb-3">
              <strong>Password</strong>
              <p>********</p>
            </div>

            <div class="text-center">
              <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editModal">Edit Profile</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content" style="width: 450px">
            <div class="modal-header">
              <h5 class="modal-title fs-6">Edit Profile</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div class="avatar mb-3">
                <img id="previewImage" style="display: none" />
                <span class="avatar-text" id="previewInitial">A</span>
              </div>

              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control form-control-sm" id="usernameInput" placeholder=" Masukkan Username" />
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control form-control-sm" id="emailInput" placeholder=" Masukkan Email" />
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <input type="password" class="form-control form-control-sm" id="passwordInput" placeholder="Masukkan password" />
                  <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Foto Profil</label>
                <input type="file" class="form-control" accept="image/*" onchange="previewPhoto(event)" />
              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
              <button class="btn btn-primary btn-sm" onclick="saveProfile()">Simpan</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="stylingjs/account1.js"></script>
  </body>
</html>

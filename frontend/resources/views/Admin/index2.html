<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  </head>
  <body style="font-family: 'Poppins', sans-serif;">
   <nav class="navbar" style="background-color: rgb(4, 4, 70);">
  <div class="d-flex align-items-center px-2">
    <i class="bi bi-list fs-4 me-2 text-white"
       role="button"
       data-bs-toggle="offcanvas"
       data-bs-target="#offcanvasScrolling"
       aria-controls="offcanvasScrolling"></i>
    <span class="navbar-brand mb-0 text-white h1">Dashboard</span>
  </div>
</nav>
<!-- off canvas -->
<div class="offcanvas offcanvas-start" style="width: 250px; background-color: rgb(4, 4, 70);" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title text-center text-white fw-bold" id="offcanvasScrollingLabel">ADMIN</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body p-0">
    <ul class="list-unstyled m-0">
      <li class="p-3 text-white">
        <i class="bi bi-columns-gap me-2"></i>
        Dashboard
      </li>
      <li class="p-3 text-white">
        <i class="bi bi-person"></i>
        Employees
      </li>
      <li class="p-3 text-white">Payroll</li>
      <li class="p-3 text-white">Reimbursement</li>
      <li class="p-3 text-white">
        <i class="bi bi-gear"></i>
        Settings
      </li>
    </ul>
  </div>
</div>
<!-- akhir off canvas -->
<div class="mx-4">
<div class="row g-4 mb-4">
  <!-- TOTAL PTK -->
  <div class="col-md-4">
    <div class="card shadow border-0 rounded-4 mt-3">
      <div class="card-body">
        <p class="text-muted mb-1">Total PTK</p>
        <h3 class="fw-bold text-primary mb-0">210</h3>
      </div>
    </div>
  </div>

  <!-- ANTRIAN REIMBURSE -->
  <div class="col-md-4">
    <div class="card shadow border-0 rounded-4 mt-3">
      <div class="card-body">
        <p class="text-muted mb-1">Antrian Reimburse</p>
        <h3 class="fw-bold text-warning mb-0">3</h3>
      </div>
    </div>
  </div>

  <!-- TOTAL NOMINAL -->
  <div class="col-md-4">
    <div class="card shadow border-0 mt-3 rounded-4">
      <div class="card-body">
        <p class="text-muted mb-1">Total Nominal</p>
        <h3 class="fw-bold text-dark mb-0">Rp 4.750.000</h3>
      </div>
    </div>
  </div>
</div>
</div>
<div class="mx-4">
  <table class="table table-light rounded">
    <thead>
      <tr>
        <th scope="col">Nama</th>
        <th scope="col">Jenis</th>
        <th scope="col">Nominasi</th>
        <th scope="col">Status</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
      </tr>
    </tbody>
  </table>
  </div>
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
      .nav-link-custom {
        text-decoration: none;
        color: white;
        display: block;
        transition: 0.3s;
      }
      .nav-link-custom:hover {
        background-color: rgba(255, 255, 255, 0.1);
        color: #0dcaf0;
      }
      .nav-active {
        background-color: rgba(255, 255, 255, 0.2);
        border-left: 4px solid #0dcaf0;
      }

      /* Tambahan CSS untuk posisi profil di bawah sidebar */
      .offcanvas-body {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .user-profile-section {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      .dropdown-toggle::after {
        display: none;
      }
    </style>
  </head>
  <body style="font-family: 'Poppins', sans-serif">
    <div class="offcanvas offcanvas-start" style="width: 250px; background-color: rgb(4, 4, 70)" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title text-center text-white fw-bold" id="offcanvasScrollingLabel">ADMIN</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      
      <div class="offcanvas-body p-0">
        <ul class="list-unstyled m-0">
          <li><a href="index2.html" class="nav-link-custom p-3 nav-active"> <i class="bi bi-columns-gap me-2"></i> Dashboard </a></li>
          <li><a href="employees.html" class="nav-link-custom p-3"> <i class="bi bi-person me-2"></i> Employees </a></li>
          <li><a href="approval.html" class="nav-link-custom p-3"> <i class="bi bi-bookmark-check me-2"></i> Approval </a></li>
          <li><a href="account.html" class="nav-link-custom p-3"> <i class="bi bi-person-bounding-box me-2"></i> Account </a></li>
        </ul>

        <div class="user-profile-section p-3 mt-auto d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center">
            <div class="bg-secondary rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">
                <i class="bi bi-person-fill text-white"></i>
            </div>
            <div class="ms-2 text-white">
              <div class="fw-bold small">Admin Name</div>
              <div style="font-size: 0.7rem; opacity: 0.7;">admin@edu.id</div>
            </div>
          </div>
          <div class="dropdown">
            <a href="#" class="text-white dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-three-dots-vertical"></i>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark shadow">
              <li><a class="dropdown-item small" href="#"><i class="bi bi-gear me-2"></i>Settings</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item small text-danger" href="login.html"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="main-content" id="main-content">
      <nav class="navbar" style="background-color: rgb(4, 4, 70)">
        <div class="d-flex align-items-center px-2">
          <i class="bi bi-list fs-4 me-2 text-white" role="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling" aria-controls="offcanvasScrolling"></i>
          <span class="navbar-brand mb-0 text-white h1">Dashboard</span>
        </div>
      </nav>

      <div class="mx-4">
        <div class="row g-4 mb-4">
          <div class="col-md-4">
            <div class="card shadow border-0 rounded-4 mt-3">
              <div class="card-body">
                <p class="text-muted mb-1">Total PTK</p>
                <h3 class="fw-bold text-primary mb-0">210</h3>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow border-0 rounded-4 mt-3">
              <div class="card-body">
                <p class="text-muted mb-1">Antrian Reimburse</p>
                <h3 class="fw-bold text-warning mb-0">3</h3>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow border-0 mt-3 rounded-4">
              <div class="card-body">
                <p class="text-muted mb-1">Total Nominal</p>
                <h3 class="fw-bold text-dark mb-0">Rp 4.750.000</h3>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mx-4">
        <table class="table table-light rounded shadow-sm">
          <thead class="table-secondary">
            <tr>
              <th scope="col">Nama</th>
              <th scope="col">Jenis</th>
              <th scope="col">Nominasi</th>
              <th scope="col">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Budi Santoso</td>
              <td>Kesehatan</td>
              <td>Rp 500.000</td>
              <td><span class="badge bg-warning text-dark">Queue</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="stylingjs/login.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="d-flex justify-content-center align-items-center mt-5">
        <div class="card shadow">
          <div class="card-body">
            <div class="row">
              <div class="col-md-12">
                <h4 class="card-title text-center fw-bold">Login</h4>
                <form id="loginForm">
                  <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control rounded-4" id="email" placeholder="Email" />
                  </div>

                  <div class="mb-3">
                    <label>Password</label>
                    <input type="password" class="form-control rounded-4" id="password" placeholder="Password" />
                  </div>

                  <button type="submit" class="btn btn-danger btn-sm w-100">Login</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../script/login.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pengajuan - EduReimburse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="stylingjsuser/cssofuser.css" />
  </head>
  <body>
    <div class="offcanvas offcanvas-start" style="width: 250px; background-color: rgb(4, 4, 70)" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="offcanvasScrolling">
      <div class="offcanvas-header border-bottom border-secondary">
        <h5 class="offcanvas-title text-white fw-bold">USER MENU</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body p-0">
        <ul class="list-unstyled m-0">
          <li>
            <a href="userdash.html" class="nav-link-custom p-3"> <i class="bi bi-columns-gap me-2"></i> Dashboard </a>
          </li>
          <li>
            <a href="riwyatuser.html" class="nav-link-custom p-3"> <i class="bi bi-file-earmark-text me-2"></i> Riwayat Saya </a>
          </li>
          <li>
            <a href="pengajuan.html" class="nav-link-custom p-3 nav-active"> <i class="bi bi-cloud-upload me-2"></i> Pengajuan </a>
          </li>
          <li>
            <a href="#" class="nav-link-custom p-3"> <i class="bi bi-gear me-2"></i> Pengaturan </a>
          </li>
        </ul>

        <div class="user-profile-section p-3 mt-auto d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center">
            <div class="bg-info rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px">
              <i class="bi bi-person-fill text-white"></i>
            </div>
            <div class="ms-2 text-white">
              <div class="fw-bold small">dangcanelo</div>
              <div style="font-size: 0.7rem; opacity: 0.7">dangcanelo@edu.id</div>
            </div>
          </div>
          <div class="dropdown">
            <a href="#" class="text-white dropdown-toggle" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></a>
            <ul class="dropdown-menu dropdown-menu-dark shadow">
              <li>
                <a class="dropdown-item small" href="#"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="main-content" id="main-content">
      <nav class="navbar shadow-sm" style="background-color: rgb(4, 4, 70)">
        <div class="d-flex align-items-center px-3 justify-content-between w-100">
          <div class="d-flex align-items-center">
            <i class="bi bi-list fs-4 me-3 text-white" role="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling"></i>
            <span class="navbar-brand mb-0 text-white h1">EduReimburse</span>
          </div>
          <div class="text-white small">Halo, dangcanelo <i class="bi bi-person-circle ms-1"></i></div>
        </div>
      </nav>

      <div class="container-fluid px-4 py-4">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card card-form">
              <div class="card-body p-4 p-md-5">
                <h4 class="fw-bold text-dark mb-4">Form Pengajuan Reimbursement</h4>
                <form id="formReimburseLaman">
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label class="form-label small fw-bold">Jenis Pengeluaran</label>
                      <select class="form-select py-2" id="jenis" required>
                        <option value="">Pilih Jenis...</option>
                        <option value="Transport">Transport</option>
                        <option value="Kesehatan">Kesehatan</option>
                        <option value="Dinas">Perjalanan Dinas</option>
                        <option value="Alat Tulis">Alat Tulis Kantor</option>
                      </select>
                    </div>
                    <div class="col-md-6 mb-3">
                      <label class="form-label small fw-bold">Tanggal Nota</label>
                      <input type="date" class="form-control py-2" id="tanggal" required />
                    </div>
                    <div class="col-12 mb-3">
                      <label class="form-label small fw-bold">Nominal Pengeluaran</label>
                      <div class="input-group">
                        <select class="form-select border-end-0 flex-grow-0" id="currency" style="width: 90px; background-color: #f1f3f5; font-weight: 600">
                          <option value="IDR" selected>IDR</option>
                          <option value="USD">USD</option>
                        </select>
                        <input type="text" class="form-control py-2 ps-3" id="nominalInput" placeholder="0" required />
                      </div>
                    </div>
                    <div class="col-12 mb-3">
                      <label class="form-label small fw-bold">Keterangan / Keperluan</label>
                      <textarea class="form-control" id="keterangan" rows="3" placeholder="Contoh: Pembelian alat peraga kelas..." required></textarea>
                    </div>
                    <div class="col-12 mb-4">
                      <label class="form-label small fw-bold">Upload Bukti Nota (Gambar/PDF)</label>
                      <div class="input-group">
                        <input type="file" class="form-control py-2" id="nota" accept="image/*,.pdf" required />
                        <label class="input-group-text" for="nota"><i class="bi bi-upload"></i></label>
                      </div>
                    </div>
                    <div class="col-12 d-flex justify-content-end gap-2 mt-3 border-top pt-4">
                      <button type="reset" class="btn btn-light px-4">Reset</button>
                      <button type="submit" class="btn text-white px-5 shadow-sm" style="background-color: rgb(4, 4, 70)">Kirim Pengajuan</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="stylingjsuser/pengajuan1.js"></script>
  </body>
</html>

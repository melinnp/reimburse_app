<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riwayat Saya - EduReimburse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="stylingjsuser/cssofuser.css" />
  </head>
  <body>
   <div class="layout" id="layout"></div> 
    <div class="main-content" id="main-content">
      <div class="container-fluid px-4 py-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h4 class="fw-bold text-dark">Laporan Pengajuan</h4>
          <div class="small text-muted">Januari 2026</div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
          <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
            <h6 class="m-0 fw-bold text-dark"><i class="bi bi-clipboard-data me-2"></i>Database Klaim</h6>
            <div class="d-flex gap-2">
              <input type="text" id="searchInput" class="form-control form-control-sm rounded-pill px-3" placeholder="Cari klaim..." />
              <select id="statusFilter" class="form-select form-select-sm  bg-light rounded-pill px-3" style="width: 160px">
                <option value="all">Semua</option>
                <option value="Sudah Cair">Sudah Cair</option>
                <option value="Queue">Queue</option>
                <option value="Ditolak">Ditolak</option>
            </select>
        </div>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0 text-nowrap" id="claimTable">
        <thead class="table-light text-uppercase small">
          <tr>
            <th class="ps-4">ID Transaksi</th>
            <th>Tanggal</th>
            <th>Nominal</th>
            <th>Status Akhir</th>
            <th class="text-center">Aksi</th>
          </tr>
        </thead>
       <tbody id="claimTableBody"></tbody>
      </table>
    </div>
          
          <div class="card-footer bg-white py-3 border-0">
            <nav>
              <ul class="pagination pagination-sm justify-content-end mb-0">
                <li class="page-item disabled">
                  <a class="page-link rounded-circle mx-1" href="#"><i class="bi bi-chevron-left"></i></a>
                </li>
                <li class="page-item active"><a class="page-link rounded-circle mx-1 shadow-sm border-0" href="#" style="background-color: rgb(4, 4, 70)">1</a></li>

                <li class="page-item"><a class="page-link rounded-circle mx-1" href="#">2</a></li>
                <li class="page-item">
                  <a class="page-link rounded-circle mx-1" href="#"><i class="bi bi-chevron-right"></i></a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="stylingjsuser/riwyatuser1.js"></script>
    <script src="../User/stylingjsuser/partials.js"></script>
    <script src="../Script/helper.js"></script>
    <script src="../Script/karyawan/riwayatUser.js"></script>
  </body>
</html>

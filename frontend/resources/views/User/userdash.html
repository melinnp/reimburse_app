    <style>
      .nav-link-custom {
        text-decoration: none;
        color: white;
        display: block;
        transition: 0.3s;
      }
      .nav-link-custom:hover {
        background-color: rgba(255, 255, 255, 0.1);
        color: #0dcaf0;
      }
      .nav-active {
        background-color: rgba(255, 255, 255, 0.2);
        border-left: 4px solid #0dcaf0;
      }
      .form-control:focus,
      .form-select:focus {
        box-shadow: none;
        border-color: #0dcaf0;
      }

  </head>

      <div class="offcanvas-header border-bottom border-secondary">
        <h5 class="offcanvas-title text-white fw-bold" id="offcanvasScrollingLabel">USER MENU</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body p-0">
        <ul class="list-unstyled m-0">
          <li>

          <li>

          </li>

          <li>
          <li>
            <a href="pengajuan.html" class="nav-link-custom p-3"> <i class="bi bi-send-arrow-down me-2"></i> Pengajuan </a>
          </li>
          <li>
            <a href="profil.html" class="nav-link-custom p-3"> <i class="bi bi-person-fill-add"></i> </i> Profil </a>
          </li>
        </ul>
      </div>

    <div class="main-content" id="main-content">
      <nav class="navbar shadow-sm" style="background-color: rgb(4, 4, 70)">
        <div class="d-flex align-items-center px-3 justify-content-between w-100">
          <div class="d-flex align-items-center">
            <i class="bi bi-list fs-4 me-3 text-white" role="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling" aria-controls="offcanvasScrolling"></i>
            <span class="navbar-brand mb-0 text-white h1">EduReimburse</span>
          </div>
          <div class="text-white small">Halo, Raphael <i class="bi bi-person-circle ms-1"></i></div>
        </div>
      </nav>
      <div class="container-fluid px-4 py-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h4 class="fw-bold text-dark">Ringkasan Klaim</h4>
          <button class="btn btn-primary rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalTambah"><i class="bi bi-plus-lg me-1"></i> Pengajuan Baru</button>
        </div>

        <div class="row g-4 mb-4">
          <div class="col-md-4">
            <div class="card border-0 rounded-4 shadow-sm">
              <div class="card-body border-start border-primary border-4 rounded-4">
                <p class="text-muted mb-1 small fw-bold text-uppercase">Total Pengajuan</p>
                <h3 class="fw-bold text-primary mb-0" id="statTotal">15</h3>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card border-0 rounded-4 shadow-sm">
              <div class="card-body border-start border-danger border-4 rounded-4">
                <p class="text-muted mb-1 small fw-bold text-uppercase">Sedang Diproses</p>
                <h3 class="fw-bold text-danger mb-0" id="statPending">2</h3>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card border-0 rounded-4 shadow-sm">
              <div class="card-body border-start border-success border-4 rounded-4">
                <p class="text-muted mb-1 small fw-bold text-uppercase">Total Selesai</p>
                <h3 class="fw-bold text-success mb-0">13</h3>
              </div>
            </div>
          </div>
        </div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
     <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
        <h6 class="m-0 fw-bold"><i class="bi bi-clock-history me-2"></i>Antrean Reimbursement Saya</h6>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4">Kategori</th>
            <th>Tanggal</th>
            <th>Nominal</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="reimburseTable">
          <tr>
            <td class="ps-4 fw-medium">Kesehatan</td>
            <td class="text-muted small">15/01/2026</td>
            <td class="fw-bold">Rp 500.000</td>
            <td><span class="badge rounded-pill bg-warning text-dark">Queue</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

      <div class="modal fade" id="modalTambah" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content border-0 shadow">
            <div class="modal-header" style="background-color: rgb(4, 4, 70)">
              <h5 class="modal-title text-white fw-bold">Form Pengajuan</h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="formReimburse">
              <div class="modal-body">
                <div class="mb-3">
                  <label class="form-label small fw-bold">Jenis Pengeluaran</label>
                  <select class="form-select" id="jenis" required>
                    <option value="">Pilih Jenis...</option>
                    <option value="Transport">Transport</option>
                    <option value="Kesehatan">Kesehatan</option>
                    <option value="Dinas">Perjalanan Dinas</option>
                    <option value="Alat Tulis">Alat Tulis Kantor</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold">Nominal (Rp)</label>
                  <input type="number" class="form-control" id="nominal" placeholder="Contoh: 150000" required />
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold">Upload Nota (Gambar)</label>
                  <input type="file" class="form-control" accept="image/*" required />
                </div>
              </div>
              <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Batal</button>
                <button type="submit" class="btn text-white px-4" style="background-color: rgb(4, 4, 70)">Kirim Pengajuan</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

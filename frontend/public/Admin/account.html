<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Dashboard - Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="stylingjs/cssoffcanvas.css" />
  </head>
  <body>
    <div class="app-layout d-flex min-vh-100">
      <div id="layout"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="layout2"></div>
        <main class="main-content mx-1 rounded-4 cream" style="height: 510px;" id="main-content">
          <div class="d-flex justify-content-center">
            <div class="card w-75 mt-5 rounded-4 mx-3">
        <main class="main-content flex-grow-1" id="main-content">
          <div class="container mt-4">
            <div class="card shadow mx-auto" style="max-width: 350px">
              <div class="card-body">
                <h5 class="text-center mb-4">Account Settings</h5>

                <div class="avatar mb-4">
                  <img id="displayAvatarImg" style="display: none" />
                  <span class="avatar-text" id="avatarInitial">U</span>
                </div>

                <div class="mb-3">
                  <strong>Username</strong>
                  <p id="displayUsername"></p>
                </div>

                <div class="mb-3">
                  <strong>Email</strong>
                  <p id="displayEmail"></p>
                </div>

                <div class="mb-3">
                  <strong>Role</strong>
                  <p id="displayRole"></p>
                </div>

                <div class="text-center">
                  <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editModal">Edit Profile</button>
                </div>
              </div>
            </div>

            <div class="modal fade" id="editModal" tabindex="-1">
              <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" style="width: 450px">
                  <div class="modal-header">
                    <h5 class="modal-title fs-6">Edit Profile</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                  </div>

                  <div class="modal-body">
                    <div class="avatar mb-3">
                      <img id="previewImage" style="display: none" />
                      <span class="avatar-text" id="previewInitial"></span>
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Username</label>
                      <input type="text" class="form-control form-control-sm" id="usernameInput" placeholder=" Masukkan Username" />
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Email</label>
                      <input type="email" class="form-control form-control-sm" id="emailInput" placeholder=" Masukkan Email" />
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Password</label>
                      <div class="input-group">
                        <input type="password" class="form-control form-control-sm" id="passwordInput" placeholder="Masukkan password" />
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                          <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                      </div>
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Foto Profil</label>
                      <input type="file" id="photoInput" class="form-control" accept="image/*" onchange="previewPhoto(event)" />
                    </div>
                  </div>

                  <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
                    <button class="btn btn-primary btn-sm" onclick="saveProfile()">Simpan</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../assets/js/bootstrap.min.js"></script>
    <script src="stylingjs/account1.js"></script>
    <script src="stylingjs/partials.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/admin/accountAdmin.js"></script>
  </body>
</html>

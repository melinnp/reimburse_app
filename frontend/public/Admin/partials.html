<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reimburse App</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="partials.css" />
</head>
<body>

    <div class="offcanvas offcanvas-start text-white" style="width: 280px; background-color: var(--primary-dark)" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="offcanvasScrolling">
        <div class="offcanvas-header border-bottom border-secondary py-4">
            <div class="d-flex align-items-center">
                <i class="bi bi-shield-lock-fill fs-4 me-2 text-info"></i>
                <h5 class="offcanvas-title fw-bold">ADMIN PANEL</h5>
            </div>
        </div>
        
        <div class="offcanvas-body p-0 d-flex flex-column">
            <ul class="list-unstyled m-0 mt-3 flex-grow-1">
                <li><a href="admindash.html" class="nav-link-custom p-3"><i class="bi bi-columns-gap me-3"></i> Dashboard</a></li>
                <li><a href="employees.html" class="nav-link-custom p-3"><i class="bi bi-people me-3"></i> Employees</a></li>
                <li><a href="approval.html" class="nav-link-custom p-3"><i class="bi bi-check2-square me-3"></i> Approval</a></li>
                <li><a href="account.html" class="nav-link-custom p-3"><i class="bi bi-gear me-3"></i> Account Settings</a></li>
            </ul>

            <div class="user-profile-section p-3 d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <img src="https://ui-avatars.com/api/?name=Admin+Name&background=0D8ABC&color=fff" class="rounded-circle" width="40" height="40">
                    <div class="ms-3">
                        <div class="fw-bold small">Admin Name</div>
                        <div style="font-size: 0.7rem; opacity: 0.6">admin@edu.id</div>
                    </div>
                </div>
                <div class="dropdown">
                    <a href="#" class="text-white opacity-75" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></a>
                    <ul class="dropdown-menu dropdown-menu-dark shadow border-secondary">
                        <li><a class="dropdown-item small" href="#">Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item small text-danger" href="login.html">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar sticky-top shadow-sm" style="background-color: var(--primary-dark)">
        <div class="container-fluid px-3">
            <div class="d-flex align-items-center">
                <i class="bi bi-list fs-2 me-2 text-white cursor-pointer" id="btn-open-sidebar" role="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling"></i>
                
                <i class="bi bi-arrow-left fs-2 me-2 text-info cursor-pointer d-none" id="btn-close-sidebar" role="button" data-bs-dismiss="offcanvas"></i>
                
                <span class="navbar-brand mb-0 text-white" id="nav-title">REIMBURSE<span class="text-info">APP</span></span>
            </div>
            <div class="d-flex align-items-center">
                <i class="bi bi-bell text-white fs-5 cursor-pointer position-relative">
                    <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
                </i>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="partials.js"></script>
</body>
</html>

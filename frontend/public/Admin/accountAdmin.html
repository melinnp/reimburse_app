<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Corporate Reimbursement - Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="stylingjs/cssoffcanvas.css" />

    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      .bg-maroon {
        background-color: rgb(105, 4, 4) !important;
      }
      .text-maroon {
        color: rgb(105, 4, 4) !important;
      }
      .btn-maroon {
        background-color: rgb(105, 4, 4);
        color: white;
        border: none;
      }
      .btn-maroon:hover {
        background-color: rgb(85, 3, 3);
        color: white;
      }
    </style>
  </head>
  <body data-page="Account">
    <div class="app-layout d-flex min-vh-100">
      <div id="layout"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="layout2"></div>

        <div id="alertBox" class="mx-3"></div>

        <div class="container mt-5">
          <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
              <div class="card shadow border-0 rounded-4 overflow-hidden">
                <div class="bg-maroon" style="height: 75px"></div>

                <div class="card-body pt-0 text-center">
                  <div class="position-relative" style="margin-top: -50px">
                    <div class="d-inline-block p-1 bg-white rounded-circle shadow-sm">
                      <div class="rounded-circle d-flex align-items-center justify-content-center bg-secondary text-white fw-bold overflow-hidden" style="width: 100px; height: 100px; font-size: 2.2rem">
                        <img id="displayAvatarImg" style="display: none; width: 100%; height: 100%; object-fit: cover" />
                        <span id="avatarInitial">U</span>
                      </div>
                    </div>
                  </div>

                  <h4 class="mt-3 mb-1 fw-bold text-dark" id="displayUsername">Loading...</h4>
                  <p class="text-muted small text-uppercase fw-semibold mb-4" id="displayRole">Employee</p>

                  <hr class="opacity-10 mx-4" />

                  <div class="text-start px-4 mt-4">
                    <div class="d-flex align-items-center mb-4">
                      <div class="rounded-3 d-flex align-items-center justify-content-center cream shadow-sm me-3" style="width: 40px; height: 40px">
                        <i class="bi bi-envelope text-maroon fs-5"></i>
                      </div>
                      <div>
                        <small class="text-muted d-block" style="font-size: 0.75rem">Email Address</small>
                        <span class="fw-medium text-dark" id="displayEmail">loading...</span>
                      </div>
                    </div>

                    <div class="d-flex align-items-center mb-4">
                      <div class="rounded-3 d-flex align-items-center justify-content-center cream shadow-sm me-3" style="width: 40px; height: 40px">
                        <i class="bi bi-shield-check text-maroon fs-5"></i>
                      </div>
                      <div>
                        <small class="text-muted d-block" style="font-size: 0.75rem">Account Status</small>
                        <span class="fw-medium text-dark">Verified Official Account</span>
                      </div>
                    </div>
                  </div>

                  <div class="px-4 pb-3">
                    <button class="btn btn-maroon btn-sm w-100 rounded-pill py-2 shadow-sm" data-bs-toggle="modal" data-bs-target="#editModal"><i class="bi bi-pencil-square me-2"></i>Edit Profile</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
              <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Edit Your Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>

              <div class="modal-body p-4">
                <div class="text-center mb-4">
                  <div class="d-inline-block position-relative">
                    <div class="rounded-circle d-flex align-items-center justify-content-center bg-light border overflow-hidden" style="width: 80px; height: 80px">
                      <img id="previewImage" style="display: none; width: 100%; height: 100%; object-fit: cover" />
                      <span class="avatar-text fs-3 fw-bold text-secondary" id="previewInitial"></span>
                    </div>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label small fw-bold">Username</label>
                  <input type="text" class="form-control rounded-3" id="usernameInput" placeholder="Masukkan Username" />
                </div>

                <div class="mb-3">
                  <label class="form-label small fw-bold">Email</label>
                  <input type="email" class="form-control rounded-3" id="emailInput" placeholder="Masukkan Email" />
                </div>

                <div class="mb-3">
                  <label class="form-label small fw-bold">Password</label>
                  <div class="input-group">
                    <input type="password" class="form-control rounded-start-3" id="passwordInput" placeholder="Isi jika ingin ganti password" />
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                      <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                  </div>
                </div>

                <div class="mb-0">
                  <label class="form-label small fw-bold">Update Foto Profil</label>
                  <input type="file" id="photoInput" class="form-control rounded-3" accept="image/*" onchange="previewPhoto(event)" />
                </div>
              </div>

              <div class="modal-footer border-0 pt-0">
                <button class="btn btn-light px-4 rounded-pill btn-sm" data-bs-dismiss="modal">Batal</button>
                <button class="btn btn-maroon px-4 rounded-pill btn-sm" onclick="saveProfile()">Simpan Perubahan</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Script/alert.js"></script>
    <script src="../Script/helper.js"></script>
    <script src="../Script/config.js"></script>
    <script src="../Script/checkAuth.js"></script>
    <script src="stylingjs/account1.js"></script>
    <script src="stylingjs/partials.js"></script>
    <script src="../Script/admin/infoAdmin.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/admin/accountAdmin.js"></script>
  </body>
</html>

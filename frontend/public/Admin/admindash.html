<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="stylingjs/cssoffcanvas.css" />
  </head>
  <body style="font-family: 'Poppins', sans-serif">
    <div class="layout" id="layout"></div>
    <div id="main-content">
      <div class="mx-4">
        <div class="row g-4 mb-4">
          <div class="col-md-4">
            <div class="card shadow border-0 rounded-4 mt-3">
              <div class="card-body">
                <p class="text-muted mb-1">Total Karyawan</p>
                <h3 class="fw-bold text-primary mb-0" id="totalKaryawan">0</h3>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow border-0 rounded-4 mt-3">
              <div class="card-body">
                <p class="text-muted mb-1">Antrian Reimburse</p>
                <h3 class="fw-bold text-warning mb-0" id="pendingReimburse">0</h3>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card shadow border-0 mt-3 rounded-4">
              <div class="card-body">
                <p class="text-muted mb-1">Total Pengajuan</p>
                <h3 class="fw-bold text-dark mb-0" id="totalPengajuan">0</h3>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mx-4">
        <table class="table table-light rounded shadow-sm">
          <thead class="table-secondary">
            <tr>
              <th scope="col">Nama</th>
              <th scope="col">Jenis</th>
              <th scope="col">Nominasi</th>
              <th scope="col">Status</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="stylingjs/index1.js"></script>
    <script src="../Admin/stylingjs/partials.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/admin/dashboard.js"></script>
  </body>
</html>

  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Bootstrap Dashboard</title>
      <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
      <link rel="stylesheet" href="stylingjs/cssoffcanvas.css" />
      <style>
        /* Container kartu utama */
  .stat-card {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: none;
      border-top: 5px solid transparent; /* Garis rahasia */
      background-color: #ffffff;
      cursor: pointer;
  }

  /* Efek saat kursor di atas kartu */
  .stat-card:hover {
      transform: translateY(-12px); /* Kartu naik ke atas */
      box-shadow: 0 15px 30px rgba(105, 4, 4, 0.15); /* Bayangan warna maroon tipis */
      border-top: 5px solid rgb(105, 4, 4); /* Garis maroon muncul */
  }

  /* Efek buat ikon di dalam kartu */
  .stat-card i {
      transition: all 0.3s ease;
  }

  .stat-card:hover i {
      transform: scale(1.3); /* Ikon membesar */
      color: rgb(105, 4, 4) !important;
  }
      </style>
    </head>
    <body style="font-family: 'Poppins', sans-serif" data-page="Dashboard">
      <div class="app-layout d-flex min-vh-100">
        <div id="layout"></div>

        <div class="flex-grow-1 d-flex flex-column">
          <div id="layout2"></div>

          <!-- Alert Box -->
          <div id="alertBox" class="mx-3"></div>

          <main class="main-content mx-1 rounded-4 cream border shadow-sm" style="height: 560px" id="main-content">
              <div class="d-flex align-items-center p-4">
                <div>
                  <h4 class="fw-bold text-dark mb-0">Reimbursement Overview</h4>
                  <p class="text-muted small">Monitor all employee reimbursement requests here.</p>
                </div>
              </div>
              <div class="mx-4">
                <div class="row g-4 mb-4">
                  <div class="col-md-3">
                    <div class="card stat-card shadow rounded-4">
                      <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                          <p class="mb-0 fw-bold small text-muted" style="letter-spacing: 1px">Queue</p>
                          <h3 class="fw-bold mb-0" id="totalQueue" style="color: rgb(105, 4, 4)">0</h3>
                        </div>
                        <div class="rounded-2 px-2 d-flex align-items-center justify-content-center shadow-sm" style="background-color: rgb(235, 227, 192)">
                          <i class="bi bi-hourglass-split fs-4" style="color: rgb(105, 4, 4)"></i>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="card stat-card shadow rounded-4">
                      <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                          <p class="mb-0 fw-bold small text-muted" style="letter-spacing: 1px">Rejected</p>
                          <h3 class="fw-bold mb-0 text-danger" id="totalRejected">0</h3>
                        </div>
                        <div class="rounded-2 px-2 d-flex align-items-center justify-content-center shadow-sm" style="background-color: rgb(255, 216, 231)">
                          <i class="bi bi-x-circle fs-4 text-danger"></i>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="card stat-card shadow rounded-4">
                      <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                          <p class="mb-0 fw-bold small text-muted" style="letter-spacing: 1px">Approved</p>
                          <h3 class="fw-bold mb-0" id="totalApproved">0</h3>
                        </div>
                        <div class="rounded-2 px-2 d-flex align-items-center justify-content-center shadow-sm" style="background-color: rgb(193, 240, 193)">
                          <i class="bi bi-check2-circle fs-4" style="color: rgb(1, 53, 31)"></i>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="card stat-card shadow rounded-4">
                      <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                          <p class="mb-0 fw-bold small text-muted" style="letter-spacing: 1px">COMPLETED</p>
                          <h3 class="fw-bold mb-0" id="totalCompleted" style="color: rgb(105, 4, 4)">0</h3>
                        </div>
                        <div class="rounded-2 px-2 d-flex align-items-center justify-content-center shadow-sm" style="background-color: rgb(243, 240, 225)">
                          <i class="bi bi-check-all fs-4" style="color: rgb(105, 4, 4)"></i>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="mx-4 mb-5">
                <div class="card mb-0 overflow-hidden rounded-4">
                  <div class="card-header bg-white text-bold">Recent Applications</div>
                  <div class="table-responsive">
                    <table class="table table-bordered rounded shadow-sm align-middle mb-0">
                      <thead class="text-center">
                        <tr>
                          <th class="text-white" style="background-color: rgb(105, 4, 4)">Name</th>
                          <th class="text-white" style="background-color: rgb(105, 4, 4)">Type</th>
                          <th class="text-white" style="background-color: rgb(105, 4, 4)">Nomination</th>
                          <th class="text-white" style="background-color: rgb(105, 4, 4)">Status</th>
                        </tr>
                      </thead>
                      <tbody></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>

      <script src="../assets/js/bootstrap.min.js"></script>
      <script src="../Script/alert.js"></script>
      <script src="../Script/helper.js"></script>
      <script src="../Script/config.js"></script>
      <script src="../Script/checkAuth.js"></script>
      <script src="stylingjs/index1.js"></script>
      <script src="../Admin/stylingjs/partials.js"></script>
      <script src="../Script/admin/infoAdmin.js"></script>
      <script src="../Script/logout.js"></script>
      <script src="../Script/admin/dashboard.js"></script>
    </body>
  </html>

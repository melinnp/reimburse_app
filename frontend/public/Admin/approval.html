<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard - Approval Reimbursement</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="stylingjs/cssoffcanvas.css" />
  </head>
  <body data-page="Approval">
    <div class="app-layout d-flex min-vh-100">
      <div id="layout"></div>
      <div class="flex-grow-1 d-flex flex-column">
        <div id="layout2"></div>
        <!-- Alert Box -->
        <div id="alertBox" class="mx-3"></div>
        <main class="main-content mx-1 rounded-4 cream shadow border" style="height: 560px" id="main-content">
          <div class="container-fluid p-4">
            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div>
                <h4 class="fw-bold text-dark mb-0">Claim Approval Center</h4>
                <p class="text-muted small mb-0">Verify and process employee reimbursement</p>
              </div>
              <div id="currentDate" class="badge bg-white text-muted border px-3 py-2 rounded-pill shadow-sm small fw-normal">Februari 2024</div>
            </div>
            <!-- BODY -->
            <div class="card rounded-4 overflow-hidden border-0 shadow-sm">
              <div class="card-header bg-white d-flex justify-content-end p-3">
                <div class="d-flex align-items-center gap-2">
                  <div style="width: 200px">
                    <input type="text" id="searchInput" class="form-control form-control-sm px-3 shadow-sm" placeholder="Search..." />
                  </div>

                  <select id="statusFilter" class="form-select form-select-sm bg-light px-3 shadow-sm" style="width: 140px">
                    <option value="all">All Status</option>
                    <option value="Sudah Cair">Approved</option>
                    <option value="Queue">Pending</option>
                    <option value="Ditolak">Rejected</option>
                    <option value="Paid">Paid</option>
                  </select>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle mb-0">
                  <thead class="text-center bg-light">
                    <tr>
                      <th class="text-white" style="background-color: rgb(105, 4, 4)">ID</th>
                      <th class="text-white" style="background-color: rgb(105, 4, 4)">Employee</th>
                      <th class="text-white" style="background-color: rgb(105, 4, 4)">Category</th>
                      <th class="text-white" style="background-color: rgb(105, 4, 4)">Nominal</th>
                      <th class="text-white" style="background-color: rgb(105, 4, 4)">Proof</th>
                      <th class="text-white" style="background-color: rgb(105, 4, 4)">Action</th>
                      <th class="text-white" style="background-color: rgb(105, 4, 4)">Status</th>
                    </tr>
                  </thead>
                  <tbody id="approvalTable"></tbody>
                </table>
              </div>
            </div>

            <div class="modal fade" id="notaModal" tabindex="-1" aria-hidden="true">
              <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                  <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="bi bi-file-earmark-image me-2"></i>Bukti Reimbursement</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body text-center">
                    <img id="notaImage"  src="" alt="Bukti Reimbursement" class="img-fluid rounded border" style="max-height: 450px;" />
                  </div>
                </div>
              </div>
            </div>

            <div class="modal fade" id="rejectModal" tabindex="-1" aria-hidden="true">
              <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                  <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold"><i class="bi bi-exclamation-triangle me-2"></i>Tolak Pengajuan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body">
                    <p>Anda akan menolak pengajuan dari <span id="rejectTargetName" class="fw-bold"></span> (<span id="rejectTargetID" class="text-muted"></span>).</p>
                    <div class="mb-3">
                      <label class="form-label fw-bold small">Alasan Penolakan</label>
                      <textarea id="rejectReason" class="form-control" rows="4" placeholder="Contoh: Nota tidak terbaca..."></textarea>
                      <div class="invalid-feedback">Alasan harus diisi!</div>
                    </div>
                  </div>
                  <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancelled</button>
                    <button type="button" class="btn btn-danger px-4" id="btnConfirmReject">Submit Rejection</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal fade" id="paymentModal" tabindex="-1" aria-labelledby="paymentModalLabel" aria-hidden="true">
              <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" style="border-radius: 15px">
                  <div class="modal-header border-0 pb-0">
                    <div class="d-flex align-items-center">
                      <img src="../Admin/Gambar/logoiii.png" class="rounded-circle" style="width: 35px; height: 35px" />
                      <span class="fs-3 ms-2 header" style="color: rgb(73, 5, 5)">Claimly</span>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>

                  <div class="modal-body px-4">
                    <span class="mt-2 d-inline-block mb-3 fw-medium text-muted">Select Payment Option</span>

                    <div class="row g-3 mb-4">
                      <div class="col-md-12">
                        <label class="card p-2 d-flex flex-row justify-content-between align-items-center cursor-pointer border-secondary-subtle">
                          <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentOption" id="bca" checked />
                            <span class="ms-2">BCA</span>
                          </div>
                          <img src="../Admin/Gambar/bca.png" style="height: 35px" />
                        </label>
                      </div>
                    </div>

                    <hr class="text-secondary opacity-25" />
                    <div class="row g-3">
                      <div class="col-md-6">
                        <label class="form-label small fw-bold">Nama Pemilik Rekening</label>
                        <input type="text" class="form-control" id="accName" />
                      </div>
                      <div class="col-md-6">
                        <label class="form-label small fw-bold">Nomor Rekening</label>
                        <input type="text" class="form-control" id="accNumber" />
                      </div>
                      <div class="col-md-6">
                        <label class="form-label small fw-bold">Nominal Transfer</label>
                        <div class="input-group">
                          <span class="input-group-text">Rp</span>
                          <input type="text" class="form-control" id="amount" />
                        </div>
                      </div>
                      <div class="col-md-6">
                        <label class="form-label small fw-bold">Tanggal Transfer</label>
                        <input type="date" class="form-control" id="transferDate" />
                      </div>
                      <div class="col-md-12">
                        <label class="form-label small fw-bold">Keterangan </label>
                        <textarea class="form-control" id="notes" rows="3" placeholder="Tambahkan catatan di sini..."></textarea>
                      </div>
                    </div>
                  </div>

                  <div class="modal-footer border-0 pt-4">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary px-4" style="background-color: rgb(73, 5, 5); border: none">Pay Now</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../assets/js/bootstrap.min.js"></script>
    <script src="../Script/alert.js"></script>
    <script src="../Script/helper.js"></script>
    <script src="../Script/config.js"></script>
    <script src="../Script/checkAuth.js"></script>
    <script src="stylingjs/approval1.js"></script>
    <script src="../Admin/stylingjs/partials.js"></script>
    <script src="../Script/admin/infoAdmin.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/admin/approval.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Dashboard - Employees</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="stylingjs/cssoffcanvas.css" />
  </head>
  <body data-page="Employees">
    <div class="app-layout d-flex min-vh-100">
      <div id="layout"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="layout2"></div>
        <main class="main-content mx-1 rounded-4 cream border shadow-sm" style="height: 560px" id="main-content">
          <div class="container">
            <div class="row">
              <div class="col-md-12">
                <div class="d-flex justify-content-between align-items-center mt-4 mx-3">
                  <div>
                    <h4 class="fw-bold text-dark mb-0">Employee Directory</h4>
                    <p class="text-muted small">Manage your team members and their </p>
                  </div>
                  <div class="d-flex align-items-center">
                    <div class="input-group me-2" style="width: 300px">
                      <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                      <input type="text" id="searchInput" class="form-control" placeholder="Cari nama atau ID..." />
                    </div>
                    <button type="button" class="btn merah text-white px-3" data-bs-toggle="modal" data-bs-target="#exampleModal">+ Create</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header merah">
                  <h1 class="modal-title fs-5 text-white" id="exampleModalLabel">Create Employee</h1>
                  <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <!-- Alert Box -->
                <div id="alertBox" class="mx-3 mt-3"></div>
                <div class="modal-body">
                  <div class="row mb-3">
                    <div class="col-3"><label class="form-label">Name</label></div>
                    <div class="col-9"><input type="text" id="name" class="form-control form-control-sm" placeholder="Ketik Nama.." /></div>
                  </div>
                  <div class="row mb-3">
                    <div class="col-3"><label class="form-label">Username</label></div>
                    <div class="col-9"><input type="text" id="username" class="form-control form-control-sm" placeholder="Ketik Username.." /></div>
                  </div>
                  <div class="row mb-3">
                    <div class="col-3"><label class="form-label">Email</label></div>
                    <div class="col-9"><input type="text" id="email" class="form-control form-control-sm" placeholder="Ketik Email.." /></div>
                  </div>
                  <div class="row mb-3">
                    <div class="col-3"><label class="form-label">Role</label></div>
                    <div class="col-9">
                      <select id="role" class="form-select form-select-sm">
                        <option value="">Select Role..</option>
                        <option value="karyawan">Employee</option>
                      </select>
                    </div>
                  </div>
                  <div class="row mb-3">
                    <div class="col-3"><label class="form-label">Password</label></div>
                    <div class="col-9"><input type="password" id="password" class="form-control form-control-sm" placeholder="Ketik Password.." /></div>
                  </div>
                </div>
                <div class="modal-footer">
                  <button id="btnSaveUser" type="button" class="btn btn-sm text-white merah">Save</button>
                </div>
              </div>
            </div>
          </div>

          <div class="mx-4 mt-4">
            <div class="table-responsive">
              <table class="table table-bordered rounded-4 shadow-sm overflow-hidden align-middle">
                <thead class="text-center">
                  <tr>
                    <th class="text-white" style="background-color: rgb(105, 4, 4)">No</th>
                    <th class="text-white" style="background-color: rgb(105, 4, 4)">Name</th>
                    <th class="text-white" style="background-color: rgb(105, 4, 4)">Username</th>
                    <th class="text-white" style="background-color: rgb(105, 4, 4)">Email</th>
                    <th class="text-white" style="background-color: rgb(105, 4, 4)">Role</th>
                    <th class="text-white" style="background-color: rgb(105, 4, 4)">Action</th>
                  </tr>
                </thead>
                <tbody id="employeeTable"></tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../assets/js/bootstrap.min.js"></script>
    <script src="../Script/alert.js"></script>
    <script src="../Script/helper.js"></script>
    <script src="../Script/config.js"></script>
    <script src="../Script/checkAuth.js"></script>
    <script src="stylingjs/employees1.js"></script>
    <script src="../Admin/stylingjs/partials.js"></script>
    <script src="../Script/admin/infoAdmin.js"></script>
    <script src="../Script/admin/getKaryawan.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/admin/createUsers.js"></script>
  </body>
</html>

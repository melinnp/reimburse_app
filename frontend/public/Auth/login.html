<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Gravitas+One&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../Admin/stylingjs/login.css" />
  </head>
  <body>
    <div class="container-fluid min-vh-100 d-flex align-items-center">
      <div class="d-flex justify-content-between w-100 px-5">
        <div class="text">
          <div class="logo d-flex justify-content-start align-items-center">
            <img src="../Admin/Gambar/logoc.jpeg" alt="Logo Claimly" class="logo-claimly rounded-circle" />
            <h5 class="ms-3">Claimly</h5>
          </div>
          <h1 class="mt-5">Create</h1>
          <h1 class="fw">Company Account</h1>
          <h6 class="mb-5">Already Registered? Login</h6>
          <h1 class="mb-5">──── ✦ ────</h1>
          <h6>More Flexibility and better privacy</h6>
        </div>
        <div class="d-flex align-items-center">
          <div class="card rounded-5">
            <div class="card-body">
              <div class="row">
                <div class="col-md-6">
                  <img src="../Admin/Gambar/gmbr1.png" class="card-foto" />
                </div>
                <div class="col-md-6">
                  <h4 class="text text-center text-dark">Login</h4>
                  <!-- Alert Box -->
                  <div id="alertBox" class="mb-3"></div>
                  <form id="loginForm">
                    <div class="mb-3">
                      <label class="text-dark">Email</label>
                      <input type="email" class="form-control rounded-4" id="email" placeholder="Email" />
                    </div>

                    <div class="mb-3">
                      <label class="text-dark">Password</label>
                      <div class="position-relative">
                        <input type="password" class="form-control rounded-4" id="password" placeholder="Password" style="padding-right: 40px" />
                        <span id="togglePassword" class="position-absolute top-50 end-0 translate-middle-y me-3" style="cursor: pointer">
                          <i class="bi bi-eye-slash" id="eyeIcon"></i>
                        </span>
                      </div>
                    </div>
                    <button type="submit" class="btn btn-sm w-100 text-white mt-2 rounded-4" style="background-color: rgb(70, 4, 4)">Login</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../assets/js/bootstrap.min.js"></script>
    <script src="../Script/alert.js"></script>
    <script src="../Script/login.js"></script>
  </body>
</html>

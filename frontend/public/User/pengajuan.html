<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pengajuan - EduReimburse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="stylingjsuser/cssofuser.css" />
  </head>

  <body>
    <div class="app-layout d-flex min-vh-100">
      <div id="layout"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="layout2"></div>

        <main class="main-content flex-grow-1" id="main-content">
          <div class="container-fluid px-4 py-4">
            <div class="row justify-content-center">
              <div class="col-lg-10 col-xl-8">
                <div class="card border-0 shadow-sm rounded-4">
                  <div class="card-body p-4 p-md-5">
                    <h4 class="fw-bold text-dark mb-4"><i class="bi bi-pencil-square me-2"></i>Form Pengajuan Reimbursement</h4>
                    <form id="pengajuanForm">
                      <div class="row">
                        <div class="col-md-6 mb-3">
                          <label class="form-label small fw-bold">Jenis Pengeluaran</label>
                          <select class="form-select py-2" id="kategori" required>
                            <option value="">Pilih Jenis...</option>
                            <option value="Transport">Transport</option>
                            <option value="Kesehatan">Kesehatan</option>
                            <option value="Dinas">Perjalanan Dinas</option>
                            <option value="Alat Tulis">Alat Tulis Kantor</option>
                          </select>
                        </div>
                        <div class="col-md-6 mb-3">
                          <label class="form-label small fw-bold">Tanggal Nota</label>
                          <input type="date" class="form-control py-2" id="tanggal" required />
                        </div>
                        <div class="col-12 mb-3">
                          <label class="form-label small fw-bold">Nominal Pengeluaran</label>
                          <div class="input-group">
                            <span class="input-group-text bg-light fw-bold">IDR</span>
                            <input type="number" class="form-control py-2" id="nominalInput" placeholder="0" required />
                          </div>
                        </div>
                        <div class="col-12 mb-3">
                          <label class="form-label small fw-bold">Keterangan / Keperluan</label>
                          <textarea class="form-control" id="keterangan" rows="3" placeholder="Contoh: Pembelian alat peraga kelas..." required></textarea>
                        </div>
                        <div class="col-12 mb-4">
                          <label class="form-label small fw-bold">Upload Bukti Nota (Gambar/PDF)</label>
                          <input type="file" class="form-control" id="nota" accept="image/*,.pdf" required />
                        </div>
                        <div class="col-12 d-flex justify-content-end gap-2 mt-3 border-top pt-4">
                          <button type="reset" class="btn btn-light px-4 rounded-pill">Reset</button>
                          <button type="submit" class="btn text-white px-5 shadow-sm rounded-pill" style="background-color: rgb(4, 4, 70)">Kirim Pengajuan</button>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../User/stylingjsuser/partials.js"></script>
    <script src="../Script/karyawan/infoUser.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/karyawan/reimburse.js"></script>
    <script src="stylingjsuser/pengajuan1.js"></script>
  </body>
</html>

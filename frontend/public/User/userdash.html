<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Dashboard - Reimbursement Sekolah</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="stylingjsuser/cssofuser.css" />
    <link rel="stylesheet" href="../Admin/stylingjs/cssoffcanvas.css" />
  </head>
  <body data-page="Dashboard">
    <div class="app-layout d-flex min-vh-100">
      <div id="layout"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="layout2"></div>

        <!-- Alert Box -->
        <div id="alertBox" class="mx-3"></div>

        <main class="main-content flex-grow-1" id="main-content">
          <div class="d-flex align-items-center p-3">
            <div>
              <h4 class="fw-bold text-dark mb-0">Reimbursement Summary</h4>
              <p class="text-muted small">Track your submitted claims and stay updated on their approval status.</p>
            </div>
          </div>
          <div class="cream card rounded-4 mx-1" style="height: 460px">
            <div class="card-body">
              <div class="row g-4 mb-4">
                <div class="col-md-3 animate-reveal" style="animation-delay: 0.2s">
                  <div class="card shadow rounded-4">
                    <div class="card-body d-flex justify-content-between align-items-center">
                      <div>
                        <p class="mb-0 fw-bold small text-muted" style="letter-spacing: 1px">Process</p>
                        <h3 class="fw-bold mb-0" id="statPending" style="color: rgb(105, 4, 4)">0</h3>
                      </div>
                      <div class="rounded-2 px-2 d-flex align-items-center justify-content-center shadow-sm" style="background-color: rgb(235, 227, 192)">
                        <i class="bi bi-hourglass-split fs-4" style="color: rgb(105, 4, 4)"></i>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="card stat-card shadow rounded-4">
                    <div class="card-body d-flex justify-content-between align-items-center">
                      <div>
                        <p class="mb-0 fw-bold small text-muted" style="letter-spacing: 1px">Approved</p>
                        <h3 class="fw-bold mb-0" id="statApproved">0</h3>
                      </div>
                      <div class="rounded-2 px-2 d-flex align-items-center justify-content-center shadow-sm" style="background-color: rgb(193, 240, 193)">
                        <i class="bi bi-check2-circle fs-4" style="color: rgb(1, 53, 31)"></i>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="card stat-card shadow rounded-4">
                    <div class="card-body d-flex justify-content-between align-items-center">
                      <div>
                        <p class="mb-0 fw-bold small text-muted" style="letter-spacing: 1px">Reject</p>
                        <h3 class="fw-bold mb-0 text-danger" id="statReject">0</h3>
                      </div>
                      <div class="rounded-2 px-2 d-flex align-items-center justify-content-center shadow-sm" style="background-color: rgb(255, 216, 231)">
                        <i class="bi bi-x-circle fs-4 text-danger"></i>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="card stat-card shadow rounded-4">
                    <div class="card-body d-flex justify-content-between align-items-center">
                      <div>
                        <p class="mb-0 fw-bold small text-muted" style="letter-spacing: 1px">Completed</p>
                        <h3 class="fw-bold mb-0" id="statSelesai" style="color: rgb(105, 4, 4)">0</h3>
                      </div>
                      <div class="rounded-2 px-2 d-flex align-items-center justify-content-center shadow-sm" style="background-color: rgb(243, 240, 225)">
                        <i class="bi bi-check-all fs-4" style="color: rgb(105, 4, 4)"></i>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="card rounded-4 overflow-hidden">
                <div class="py-3 d-flex justify-content-start align-items-center">
                  <i class="bi bi-clock fs-6 pe-2 ps-3"></i>
                  <h6 class="mb-0 fw-bold">My Reimbursement Queue</h6>
                </div>
                <div class="table-responsive">
                  <table class="table table-bordered align-middle mb-0">
                    <thead>
                      <tr class="text-center">
                        <th class="text-white" style="background-color: rgb(105, 4, 4)">Category</th>
                        <th class="text-white" style="background-color: rgb(105, 4, 4)">Date</th>
                        <th class="text-white" style="background-color: rgb(105, 4, 4)">Nominal</th>
                        <th class="text-white" style="background-color: rgb(105, 4, 4)">Status</th>
                      </tr>
                    </thead>
                    <tbody id="reimburseTable"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../assets/js/bootstrap.min.js"></script>
    <script src="../Script/alert.js"></script>
    <script src="../Script/helper.js"></script>
    <script src="../Script/config.js"></script>
    <script src="../Script/checkAuth.js"></script>
    <script src="stylingjsuser/userdash1.js"></script>
    <script src="../User/stylingjsuser/partials.js"></script>
    <script src="../Script/karyawan/infoUser.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/karyawan/dashboard.js"></script>
    <link rel="stylesheet" href="../user/stylingjsuser/warna.css" />
  </body>
</html>

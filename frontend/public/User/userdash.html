<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Dashboard - Reimbursement Sekolah</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="stylingjsuser/cssofuser.css" />
  </head>
  <body>
    <div class="app-layout d-flex min-vh-100">
      <div id="layout"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="layout2"></div>

        <main class="main-content flex-grow-1" id="main-content">
          <div class="cream card rounded-4 mx-1">
            <div class="card-body">
              <div class="row g-4 mb-4">
                <div class="col-md-3">
                  <div class="card border-0 rounded-4 shadow-sm">
                    <div class="card-body rounded-4">
                      <p class="mb-1 small fw-bold text-center">TOTAL PENGAJUAN</p>
                      <h3 class="fw-bold text-center mb-0" id="statTotal">0</h3>
                    </div>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="card border-0 rounded-4 shadow-sm">
                    <div class="card-body rounded-4">
                      <p class="mb-1 small fw-bold text-center">SEDANG DI PROSES</p>
                      <h3 class="fw-bold text-center mb-0" id="statPending">0</h3>
                    </div>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="card border-0 rounded-4 shadow-sm">
                    <div class="card-body rounded-4">
                      <p class="mb-1 small text-center fw-bold">TOTAL SELESAI</p>
                      <h3 class="fw-bold mb-0 text-center" id="statApproved">0</h3>
                    </div>
                  </div>
                </div>
              </div>

              <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="card-header py-3 bg-white d-flex justify-content-between align-items-center">
                  <h6 class="m-0 fw-bold"><i class="bi bi-clock-history me-2"></i>Antrean Reimbursement Saya</h6>
                </div>
                <div class="table-responsive">
                  <table class="table table-hover align-middle mb-0">
                    <thead>
                      <tr>
                        <th class=" ps-4">Kategori</th>
                        <th>Tanggal</th>
                        <th>Nominal</th>
                        <th>Status</th>
                      </tr>
                    </thead>
                    <tbody id="reimburseTable">
                      <tr>
                        <td class="ps-4 fw-medium">Kesehatan</td>
                        <td class="text-muted small">15/01/2026</td>
                        <td class="fw-bold">Rp 500.000</td>
                        <td><span class="badge rounded-pill bg-warning text-dark">Queue</span></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="stylingjsuser/userdash1.js"></script>
    <script src="../User/stylingjsuser/partials.js"></script>
    <script src="../Script/karyawan/infoUser.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/helper.js"></script>
    <script src="../Script/karyawan/dashboard.js"></script>
    <link rel="stylesheet" href="../User/stylingjsuser/warna.css" />
  </body>
</html>

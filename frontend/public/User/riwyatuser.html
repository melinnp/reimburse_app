<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riwayat Saya - EduReimburse</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="stylingjsuser/cssofuser.css" />
  </head>
  <body>

    <div class="app-layout d-flex min-vh-100">
      
      <div id="layout"></div>

      <div class="flex-grow-1 d-flex flex-column">
        
        <div id="layout2"></div>

        <main class="main-content flex-grow-1" id="main-content">
          <div class="container-fluid px-4 py-3">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h4 class="fw-bold text-dark m-0">Laporan Pengajuan</h4>
              <div class="badge bg-light text-muted border px-3 py-2 rounded-pill">Januari 2026</div>
            </div>

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
              <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
                <h6 class="m-0 fw-bold text-dark"><i class="bi bi-clipboard-data me-2"></i>Database Klaim</h6>
                
                <div class="d-flex gap-2">
                  <input type="text" id="searchInput" class="form-control form-control-sm rounded-pill px-3" placeholder="Cari klaim..." />
                  <select id="statusFilter" class="form-select form-select-sm bg-light rounded-pill px-3" style="width: 160px">
                    <option value="all">Semua Status</option>
                    <option value="Sudah Cair">Sudah Cair</option>
                    <option value="Queue">Queue</option>
                    <option value="Ditolak">Ditolak</option>
                  </select>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 text-nowrap" id="claimTable">
                  <thead class="table-light text-uppercase small">
                    <tr>
                      <th class="ps-4">ID Transaksi</th>
                      <th>Tanggal</th>
                      <th>Nominal</th>
                      <th>Status Akhir</th>
                      <th class="text-center">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="claimTableBody">
                    <tr>
                      <td colspan="5" class="text-center py-4 text-muted">Memuat data...</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="card-footer bg-white py-3 border-top-0">
                <nav>
                  <ul class="pagination pagination-sm justify-content-end mb-0">
                    <li class="page-item disabled">
                      <a class="page-link rounded-circle mx-1" href="#"><i class="bi bi-chevron-left"></i></a>
                    </li>
                    <li class="page-item active">
                      <a class="page-link rounded-circle mx-1 shadow-sm border-0" href="#" style="background-color: rgb(4, 4, 70)">1</a>
                    </li>
                    <li class="page-item">
                      <a class="page-link rounded-circle mx-1" href="#">2</a>
                    </li>
                    <li class="page-item">
                      <a class="page-link rounded-circle mx-1" href="#"><i class="bi bi-chevron-right"></i></a>
                    </li>
                  </ul>
                </nav>
              </div>
            </div> </div>
        </main>
      </div> </div> <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
          <div class="modal-header border-bottom-0">
            <h1 class="modal-title fs-5 fw-bold" id="exampleModalLabel">Detail Pengajuan</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body pt-0">
            <div class="rounded-4 overflow-hidden mb-3 border">
              <img src="../Admin/Gambar/bg1.jpeg" class="w-100" id="modalNotaImage" style="object-fit: cover; height: 200px" />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Jenis Pengeluaran</label>
              <input type="text" class="form-control form-control-sm bg-light border-0" id="jenis" readonly />
            </div>
            
            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Nominal Pengeluaran</label>
              <input type="text" class="form-control form-control-sm bg-light border-0" id="nominal" readonly />
            </div>
            
            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Keterangan</label>
              <textarea class="form-control form-control-sm bg-light border-0" id="ket" rows="2" readonly></textarea>
            </div>

            <div id="adminNoteWrapper" style="display: none;">
              <div class="alert alert-danger border-0 rounded-3">
                <label class="form-label small fw-bold mb-1">
                  <i class="bi bi-exclamation-triangle-fill me-1"></i>Catatan Admin
                </label>
                <p id="adminNote" class="small mb-0"></p>
              </div>
            </div>
          </div>
          <div class="modal-footer border-top-0">
            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Tutup</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="stylingjsuser/riwyatuser1.js"></script>
    <script src="../User/stylingjsuser/partials.js"></script>
    <script src="../Script/helper.js"></script>
    <script src="../Script/karyawan/riwayatUser.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/karyawan/infoUser.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riwayat Saya - EduReimburse</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="stylingjsuser/cssofuser.css" />
  </head>
  <body data-page="History">
    <div class="app-layout d-flex min-vh-100">
      <div id="layout"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="layout2"></div>

        <!-- Alert Box -->
        <div id="alertBox" class="mx-3 mt-3"></div>

        <main class="main-content flex-grow-1" id="main-content">
          <div class="card border-0 shadow-sm rounded-4 mx-1 cream overflow-hidden">
            <div class="card-header cream py-3 border-bottom d-flex justify-content-between align-items-center">
              <div class="d-flex gap-2">
                <input type="text" id="searchInput" class="form-control form-control-sm rounded-pill px-3" placeholder="Search for claims..." />
                <select id="statusFilter" class="form-select form-select-sm bg-light rounded-pill px-3" style="width: 160px">
                  <option value="all">All Status</option>
                  <option value="Sudah Cair">Approved</option>
                  <option value="Queue">Queue</option>
                  <option value="Ditolak">Rejected</option>
                </select>
              </div>
              <div class="badge bg-light text-muted border px-3 py-2 rounded-pill">Januari 2026</div>
            </div>
            <div class="container-fluid px-3 pb-3">
              <div class="table-responsive">
                <table class="table align-middle mb-0 text-nowrap" id="claimTable">
                  <thead class="table-light text-uppercase small">
                    <tr>
                      <th class="text-center">ID Transaksi</th>
                      <th class="text-center">Date</th>
                      <th class="text-center">Nominal</th>
                      <th class="text-center">Final Status</th>
                      <th class="text-center">Action</th>
                    </tr>
                  </thead>
                  <tbody id="claimTableBody">
                    <tr>
                      <td colspan="5" class="text-center py-4 text-muted">Loading data...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
          <div class="modal-header border-bottom-0">
            <h1 class="modal-title fs-5 fw-bold" id="exampleModalLabel">Detail Reimburse</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body pt-0">
            <div class="rounded-4 overflow-hidden mb-3 border">
              <img class="w-100" id="modalNotaImage" style="object-fit: cover; height: 200px" />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Types of Expenses</label>
              <input type="text" class="form-control form-control-sm bg-light border-0" id="jenis" readonly />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Expense Amount</label>
              <input type="text" class="form-control form-control-sm bg-light border-0" id="nominal" readonly />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Information</label>
              <textarea class="form-control form-control-sm bg-light border-0" id="ket" rows="2" readonly></textarea>
            </div>

            <div id="adminNoteWrapper" style="display: none">
              <div class="alert alert-danger border-0 rounded-3">
                <label class="form-label small fw-bold mb-1"> <i class="bi bi-exclamation-triangle-fill me-1"></i>Admin Notes </label>
                <p id="adminNote" class="small mb-0"></p>
              </div>
            </div>
          </div>
          <div class="modal-footer border-top-0">
            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Edit -->
    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
          <div class="modal-header border-bottom-0">
            <h5 class="modal-title fw-bold">Edit Submission</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body pt-0">
            <input type="hidden" id="editId" />

            <!-- Preview Nota Lama -->
            <div class="rounded-4 overflow-hidden mb-3 border">
              <img src="" class="w-100" id="editNotaPreview" style="object-fit: cover; height: 200px; display: none" />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Type of Expenditure</label>
              <select class="form-select form-select-sm" id="editKategori" required>
                <option value="">Select Type...</option>
                <option value="Transport">Transport</option>
                <option value="Kesehatan">Kesehatan</option>
                <option value="Dinas">Perjalanan Dinas</option>
                <option value="Alat Tulis">Alat Tulis Kantor</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Date</label>
              <input type="date" class="form-control form-control-sm" id="editTanggal" required />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Nominal Expenditure</label>
              <input type="number" class="form-control form-control-sm" id="editNominal" required />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Description</label>
              <textarea class="form-control form-control-sm" id="editKeterangan" rows="3" required></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Upload New Note (Opsional)</label>
              <input type="file" class="form-control form-control-sm" id="editNota" accept="image/*,.pdf" />
              <small class="text-muted">Leave blank if you don't want to change notes</small>
            </div>
          </div>
          <div class="modal-footer border-top-0">
            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary rounded-pill px-4" onclick="submitEdit()">Save Changes</button>
          </div>
        </div>
      </div>
    </div>

    <script src="../Script/checkAuth.js"></script>
    <script src="../assets/js/bootstrap.min.js"></script>
    <script src="../Script/alert.js"></script>
    <script src="../User/stylingjsuser/riwyatuser1.js"></script>
    <script src="../User/stylingjsuser/partials.js"></script>
    <script src="../Script/karyawan/infoUser.js"></script>
    <script src="../Script/karyawan/riwayatUser.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/helper.js"></script>
  </body>
</html>

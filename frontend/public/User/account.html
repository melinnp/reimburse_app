<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account Settings - EduReimburse</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="stylingjsuser/cssofuser.css" />
    <link rel="stylesheet" href="stylingjsuser/warna.css" />
  </head>

  <body data-page="Account">
    <div class="app-layout d-flex min-vh-100">
      <div id="layout"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="layout2"></div>

        <!-- Alert Box -->
        <div id="alertBox" class="mx-3 mt-3"></div>

        <main class="main-content flex-grow-1" id="main-content">
          <div class="container rounded-4 mx-1 cream py-5" style="height: 560px">
            <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 450px">
              <div class="card-body p-4 text-center">
                <h5 class="fw-bold mb-4">Account Settings</h5>

                <div class="avatar-wrapper mb-4 d-flex justify-content-center">
                  <div class="rounded-circle merah d-flex align-items-center justify-content-center text-white shadow" style="width: 100px; height: 100px; overflow: hidden">
                    <img id="displayAvatarImg" style="width: 100%; height: 100%; object-fit: cover; display: none" />
                    <span class="fs-1 fw-bold" id="avatarInitial">U</span>
                  </div>
                </div>

                <div class="text-start bg-light p-3 rounded-3 mb-4">
                  <div class="mb-3">
                    <small class="text-muted d-block">Username</small>
                    <strong id="displayUsername" class="fs-6">-</strong>
                  </div>
                  <div class="mb-3">
                    <small class="text-muted d-block">Email</small>
                    <strong id="displayEmail" class="fs-6">-</strong>
                  </div>
                  <div class="mb-0">
                    <small class="text-muted d-block">Role</small>
                    <span class="badge bg-dark" id="displayRole">User</span>
                  </div>
                </div>

                <button class="btn merah w-100 rounded-pill text-white" data-bs-toggle="modal" data-bs-target="#editModal"><i class="bi bi-pencil-square me-2"></i>Edit Profil</button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold">Edit Profile</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3 text-center">
              <div class="mx-auto rounded-circle bg-secondary d-flex align-items-center justify-content-center text-white mb-2" style="width: 80px; height: 80px; overflow: hidden">
                <img id="previewImage" style="width: 100%; height: 100%; object-fit: cover; display: none" />
                <span id="previewInitial" class="fs-2"></span>
              </div>
              <input type="file" id="photoInput" class="form-control form-control-sm" accept="image/*" onchange="previewPhoto(event)" />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold">Username</label>
              <input type="text" class="form-control" id="usernameInput" placeholder="Username baru" />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold">Email</label>
              <input type="email" class="form-control" id="emailInput" placeholder="Email baru" />
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold">Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="passwordInput" placeholder="Password baru" />
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                  <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Batal</button>
            <button class="btn btn-primary rounded-pill px-4" onclick="saveProfile()">Simpan Perubahan</button>
          </div>
        </div>
      </div>
    </div>

    <script src="../assets/js/bootstrap.min.js"></script>
    <script src="../Script/alert.js"></script>
    <script src="../Script/helper.js"></script>
    <script src="../Script/config.js"></script>
    <script src="../Script/checkAuth.js"></script>
    <script src="stylingjsuser/account.js"></script>
    <script src="../User/stylingjsuser/partials.js"></script>
    <script src="../Script/karyawan/infoUser.js"></script>
    <script src="../Script/logout.js"></script>
    <script src="../Script/karyawan/accountUser.js"></script>
  </body>
</html>
